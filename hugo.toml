baseURL = "https://akemarropa.github.io/blog/"
publishDir = "docs"
theme = "blowfish"

# Solo esto es necesario para un blog en un único idioma
defaultContentLanguage = "en"

[[menu.main]]
  name = "Home"
  url = "/"
  weight = 1

[params]
# ... resto de tu configuración ...

[params]
# ... resto de tu configuración ...
[params]
  colorScheme = "blowfish"
  defaultAppearance = "dark"
  showAppearanceToggle = true
  enableSearch = false
  headerLayout = "basic"

  [params.footer]
    showPoweredBy = false
    showHugoGenerator = false
    showCopyright = true

[params.homepage]
  showRecent = true
  showRecentItems = 10
  layout = "background"