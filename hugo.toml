baseURL = "https://akemarropa.github.io/blog/"
theme = "blowfish"
title = "ake blog"

# Idioma por defecto
defaultContentLanguage = "en"
defaultContentLanguageInSubdir = false

# --- FIX DE RUTAS ---
# Dejamos estos en false para que Hugo genere rutas absolutas correctas
relativeURLs = false
canonifyURLs = false

# Desactivar lo innecesario
disableKinds = ["taxonomy", "term"]

[taxonomies]
  tag = ""
  category = ""

[permalinks]
  posts = "/posts/:slug/"

[languages]
  [languages.en]
    languageName = "English"
    contentDir = "content"
    languageCode = "en"
    weight = 1

  [languages.es]
    languageName = "Español"
    contentDir = "content/es"
    languageCode = "es"
    weight = 2