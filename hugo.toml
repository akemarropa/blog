baseURL = "https://akemarropa.github.io/blog/"
theme = "blowfish"
title = "ake blog"

# IMPORTANTE: Desactivamos el modo relativo para que las rutas sean absolutas
relativeURLs = false
canonifyURLs = false 

# Idioma por defecto
defaultContentLanguage = "en"
defaultContentLanguageInSubdir = false

# Limpieza total de secciones que no usamos
disableKinds = ["taxonomy", "term", "RSS", "sitemap"]

[taxonomies]
  tag = ""
  category = ""

[permalinks]
  posts = "/posts/:slug/"

[languages]
  [languages.en]
    languageName = "English"
    contentDir = "content"
    languageCode = "en"
    weight = 1

  [languages.es]
    languageName = "Español"
    contentDir = "content/es"
    languageCode = "es"
    weight = 2