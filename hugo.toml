baseURL = "https://akemarropa.github.io/blog/"
theme = "blowfish"
title = "ake blog"
languageCode = "en"

# Forzar rutas correctas
relativeURLs = false
canonifyURLs = false

# Limpieza total
disableKinds = ["taxonomy", "term", "RSS", "sitemap"]

[permalinks]
  posts = "/posts/:slug/"

[params]
  colorScheme = "blowfish"
  defaultAppearance = "dark"