baseURL = "https://akemarropa.github.io/blog/"
publishDir = "docs"
theme = "blowfish"
title = "ake blog" # <--- AÑADE ESTO (puedes cambiar el nombre)

defaultContentLanguage = "en"

[[menu.main]]
  name = "Home"
  url = "https://akemarropa.github.io/blog/" # URL absoluta para evitar errores
  weight = 1

[params]
  colorScheme = "blowfish"
  defaultAppearance = "dark"
  showAppearanceToggle = true
  enableSearch = false
  headerLayout = "basic" # Esto fuerza a que se vea el título y el menú

  [params.footer]
    showPoweredBy = false
    showHugoGenerator = false
    showCopyright = true

[params.homepage]
  showRecent = true
  showRecentItems = 10
  layout = "background"