baseURL = "https://akemarropa.github.io/blog/"
publishDir = "docs"
theme = "blowfish"
title = "ake blog"

# Forzamos un solo idioma
defaultContentLanguage = "en"
disableLanguages = ["es"]

# Rutas absolutas para evitar el error de localhost
canonifyURLs = true
relativeURLs = false

# Limpieza de archivos innecesarios
disableKinds = ["taxonomy", "term", "RSS", "sitemap"]

[permalinks]
  posts = "/posts/:slug/"

[params]
  colorScheme = "blowfish"
  defaultAppearance = "dark"