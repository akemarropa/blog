baseURL = "https://akemarropa.github.io/blog/"
publishDir = "docs"
theme = "blowfish"
title = "ake Blog"

defaultContentLanguage = "en"

[[menu.main]]
  name = "Home"
  url = "https://akemarropa.github.io/"
  weight = 1

[params]
  colorScheme = "blowfish"
  defaultAppearance = "dark"
  showAppearanceToggle = true
  enableSearch = false
  headerLayout = "basic"
  # Esta línea es la clave para que use el SVG
  favicon = "favicon.svg"

  [params.footer]
    showPoweredBy = false
    showHugoGenerator = false
    showCopyright = true

[params.homepage]
  showRecent = true
  showRecentItems = 10
  layout = "background"
  title = "" 
  showTitle = false