baseURL = "https://akemarropa.github.io/blog/"
publishDir = "docs"
theme = "blowfish"
title = "Ake Blog" # Esto mantiene el nombre en la pestaña y en el logo superior

defaultContentLanguage = "en"

[[menu.main]]
  name = "Home"
  url = "https://akemarropa.github.io/"
  weight = 1

[params]
  colorScheme = "blowfish"
  defaultAppearance = "dark"
  showAppearanceToggle = true
  enableSearch = false
  headerLayout = "basic"

  [params.footer]
    showPoweredBy = false
    showHugoGenerator = false
    showCopyright = true

[params.homepage]
  showRecent = true
  showRecentItems = 10
  layout = "background"
  # EL TRUCO: Dejamos el título de la home vacío aquí para que no se pinte en el centro
  title = "" 
  showTitle = false