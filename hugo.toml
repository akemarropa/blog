baseURL = "https://akemarropa.github.io/blog/"
publishDir = "docs"
theme = "blowfish"
title = "ake blog"

# Forzamos solo inglés para que no cree subcarpetas /en/ o /es/
defaultContentLanguage = "en"
disableLanguages = ["es"]

# RUTAS CRÍTICAS
canonifyURLs = true
relativeURLs = false

disableKinds = ["taxonomy", "term", "RSS", "sitemap"]

[permalinks]
  posts = "/posts/:slug/"

[params]
  colorScheme = "blowfish"
  defaultAppearance = "dark"