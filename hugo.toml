baseURL = "https://akemarropa.github.io/blog/"
publishDir = "docs"
theme = "blowfish"

# Forzar un solo idioma y eliminar el rastro de 'es'
defaultContentLanguage = "en"
disableLanguages = ["es"]

[languages]
  [languages.en]
    contentDir = "content"
    languageName = "English"
    weight = 1

[params]
  colorScheme = "blowfish"
  defaultAppearance = "dark"