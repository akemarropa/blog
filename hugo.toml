baseURL = "https://akemarropa.github.io/blog/"
theme = "blowfish"
title = "ake blog"

defaultContentLanguage = "en"

# NO USAR relativeURLs si da problemas de estilo
relativeURLs = false
canonifyURLs = true

disableKinds = ["taxonomy", "term"]

[taxonomies]
  tag = ""
  category = ""

[permalinks]
  posts = "/posts/:slug/"

[languages]
  [languages.en]
    languageName = "English"
    contentDir = "content"
    languageCode = "en"
    weight = 1
  [languages.es]
    languageName = "Español"
    contentDir = "content/es"
    languageCode = "es"
    weight = 2