baseURL = "https://akemarropa.github.io/blog/"
theme = "blowfish"
title = "ake blog"

defaultContentLanguage = "en"
defaultContentLanguageInSubdir = false # Esto es clave para que el inglés no se rompa

# --- FIX DE ESTILOS ---
relativeURLs = false
canonifyURLs = true

disableKinds = ["taxonomy", "term"]

[taxonomies]
  tag = ""
  category = ""

[permalinks]
  posts = "/posts/:slug/"

[languages]
  [languages.en]
    languageName = "English"
    contentDir = "content"
    languageCode = "en"
    weight = 1

  [languages.es]
    languageName = "Español"
    contentDir = "content/es"
    languageCode = "es"
    weight = 2