baseURL = "https://akemarropa.github.io/blog/"
publishDir = "docs"
theme = "blowfish"

defaultContentLanguage = "en"
disableLanguages = ["es"]

[params]
  colorScheme = "blowfish"
  defaultAppearance = "dark"
  # Esto permite que la rueda funcione pero no se mueva sola
  showAppearanceToggle = true
  
  # Forzamos la desactivación de lo que no queremos
  enableSearch = false

# ESTA SECCIÓN ES LA QUE ELIMINA EL "POWERED BY" DEFINITIVAMENTE
[params.footer]
  showPoweredBy = false
  showHugoGenerator = false
  showCopyright = true

[params.homepage]
  showRecent = true
  showRecentItems = 10
  layout = "background"