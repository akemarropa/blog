baseURL = "https://akemarropa.github.io/blog/"
publishDir = "docs"
theme = "blowfish"
title = "Ake Blog"

defaultContentLanguage = "en"

[[menu.main]]
  name = "Home"
  url = "https://akemarropa.github.io/" # <--- Cambiado a la raíz principal
  weight = 1

[params]
  colorScheme = "blowfish"
  defaultAppearance = "dark"
  showAppearanceToggle = true
  enableSearch = false
  headerLayout = "basic"

  [params.footer]
    showPoweredBy = false
    showHugoGenerator = false
    showCopyright = true

[params.homepage]
  showRecent = true
  showRecentItems = 10
  layout = "background"
  showTitle = false # <--- Esto quita el título del centro de la pantalla