backend:
  name: github
  repo: akemarropa/blog
  branch: main

# Definición de rutas (Soluciona el error de "Media folder not defined")
media_folder: "static/images"
public_folder: "/images"

# Definición de colecciones (Soluciona el error de "Collections not defined")
collections:
  - name: "posts"
    label: "Post"
    folder: "content/posts"
    create: true
    slug: "{{slug}}"
    fields:
      - {label: "Título", name: "title", widget: "string"}
      - {label: "Fecha", name: "date", widget: "datetime"}
      - {label: "Borrador", name: "draft", widget: "boolean", default: false}
      - {label: "Cuerpo", name: "body", widget: "markdown"}