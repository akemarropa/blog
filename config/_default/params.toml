# Configuración General del Tema Blowfish
# Editado para: ake blog

[header]
  layout = "basic" # Opciones: basic, logo, search
  showSearch = false
  showAppearanceSwitcher = false

[footer]
  showCopyright = true
  showCopyrightAuthor = true
  showPoweredBy = false
  showDonationButton = false

[article]
  # --- LIMPIEZA DE CONTENIDO RELACIONADO ---
  showRelated = false           # DESACTIVADO: No mostrará otros posts al final
  showRelatedImages = false
  
  # --- CONFIGURACIÓN DE EDICIÓN ---
  showEdit = false              # DESACTIVADO: Quita el enlace de "Edit this page"
  editURL = "https://github.com/akemarropa/blog/tree/main/content"
  editAppendPath = true

  # --- OTRAS OPCIONES ---
  showDate = true
  showViews = false
  showLikes = false
  showAuthor = true
  showReadingTime = true
  showTaxonomies = true

